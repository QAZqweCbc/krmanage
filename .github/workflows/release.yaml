name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v2026.3.1'
        required: true
        default: 'v2026.3.1'

permissions:
  contents: write

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: pnpm install --frozen-lockfile

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-x64
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      - name: Package Windows x64
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $packageName = "kiro-rs-v$version-windows-x64"
          New-Item -ItemType Directory -Path $packageName | Out-Null
          Copy-Item target/release/kiro-rs.exe "$packageName/kiro-rs.exe"
          @'
          {
            "host": "127.0.0.1",
            "port": 8990,
            "apiKey": "sk-kiro-rs-change-me",
            "adminApiKey": "admin-change-me",
            "region": "us-east-1",
            "loadBalancingMode": "priority"
          }
          '@ | Set-Content -LiteralPath "$packageName/config.example.json" -Encoding UTF8
          '[]' | Set-Content -LiteralPath "$packageName/credentials.example.json" -Encoding UTF8
          @'
          # kiro-rs Windows x64

          1. Rename config.example.json to config.json and change apiKey/adminApiKey.
          2. Rename credentials.example.json to credentials.json, or add credentials in Admin UI.
          3. Run:

             .\kiro-rs.exe -c .\config.json --credentials .\credentials.json

          Admin UI: http://127.0.0.1:8990/admin
          API Base URL: http://127.0.0.1:8990
          '@ | Set-Content -LiteralPath "$packageName/README.txt" -Encoding UTF8
          Compress-Archive -Path $packageName -DestinationPath "$packageName.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: kiro-rs ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: kiro-rs-v${{ steps.version.outputs.version }}-windows-x64.zip

  linux-x64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: pnpm install --frozen-lockfile

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux-x64
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      - name: Package Linux x64
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          package_name="kiro-rs-v${version}-linux-x64"
          mkdir -p "$package_name"
          cp target/release/kiro-rs "$package_name/kiro-rs"
          chmod +x "$package_name/kiro-rs"
          cat > "$package_name/config.example.json" <<'JSON'
          {
            "host": "127.0.0.1",
            "port": 8990,
            "apiKey": "sk-kiro-rs-change-me",
            "adminApiKey": "admin-change-me",
            "region": "us-east-1",
            "loadBalancingMode": "priority"
          }
          JSON
          echo '[]' > "$package_name/credentials.example.json"
          cat > "$package_name/README.txt" <<'README'
          # kiro-rs Linux x64

          1. Rename config.example.json to config.json and change apiKey/adminApiKey.
          2. Rename credentials.example.json to credentials.json, or add credentials in Admin UI.
          3. Run:

             chmod +x ./kiro-rs
             ./kiro-rs -c ./config.json --credentials ./credentials.json

          Admin UI: http://127.0.0.1:8990/admin
          API Base URL: http://127.0.0.1:8990
          README
          tar -czf "$package_name.tar.gz" "$package_name"

      - name: Upload Linux asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: kiro-rs ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: kiro-rs-v${{ steps.version.outputs.version }}-linux-x64.tar.gz
